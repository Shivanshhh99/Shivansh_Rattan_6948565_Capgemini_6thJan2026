<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="dashboard" id="dashboard">
    <div class="bg-layer" id="bgLayer"></div>

    <div class="content">
      <header>
        <h1 class="title">🌍 Weather Today</h1>
        <p class="tagline">Enter a city to check mock conditions</p>
      </header>

      <div class="search-bar">
        <input
          type="text"
          id="cityInput"
          class="city-input"
          placeholder="e.g. Paris, Tokyo, New York…"
          onkeydown="handleKey(event)"
          maxlength="50"
        />
        <button class="check-btn" onclick="checkWeather()">Check Weather</button>
      </div>

      <div class="weather-card" id="weatherCard">
        <!-- Filled by JS -->
      </div>

      <div class="suggestions">
        <span>Try: </span>
        <button class="chip" onclick="quickSearch('London')">London</button>
        <button class="chip" onclick="quickSearch('Mumbai')">Mumbai</button>
        <button class="chip" onclick="quickSearch('Reykjavik')">Reykjavik</button>
        <button class="chip" onclick="quickSearch('Sydney')">Sydney</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
